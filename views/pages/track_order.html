<script>
const fmt  = n => new Intl.NumberFormat('vi-VN').format(n);
const fmtD = d => new Date(d).toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric'});

const STATUS_MAP = {
    pending:   { label: 'Chờ xác nhận', badge: 'warning text-dark', icon: 'clock' },
    confirmed: { label: 'Đã xác nhận',  badge: 'success',           icon: 'check-circle' },
    completed: { label: 'Hoàn thành',   badge: 'primary',           icon: 'flag-checkered' },
    cancelled: { label: 'Đã hủy',       badge: 'danger',            icon: 'times-circle' }
};

function pad(n) { return String(n).padStart(6, '0'); }

async function trackOrder() {
    const phone = document.getElementById('phoneInput').value.trim().replace(/\s+/g, '');
    const alertEl  = document.getElementById('trackAlert');
    const resultEl = document.getElementById('trackResult');
    const btn      = document.getElementById('trackBtn');

    alertEl.innerHTML  = '';
    resultEl.innerHTML = '';

    if (!phone) {
        alertEl.innerHTML = '<div class="alert alert-warning py-2 mb-0"><i class="fas fa-exclamation-circle me-2"></i>Vui lòng nhập số điện thoại</div>';
        return;
    }
    if (!/^[0-9]{9,11}$/.test(phone)) {
        alertEl.innerHTML = '<div class="alert alert-warning py-2 mb-0"><i class="fas fa-exclamation-circle me-2"></i>Số điện thoại không hợp lệ</div>';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Đang tìm...';

    try {
        const res  = await fetch(`controllers/booking_controller.php?action=trackByPhone&phone=${encodeURIComponent(phone)}`);
        const data = await res.json();

        if (!data.success) {
            alertEl.innerHTML = `<div class="alert alert-danger py-2 mb-0"><i class="fas fa-exclamation-circle me-2"></i>${data.message}</div>`;
        } else if (!data.data.length) {
            resultEl.innerHTML = `
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center py-5">
                        <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                        <p class="text-muted mb-0">Không tìm thấy đơn nào với số điện thoại <strong>${phone}</strong></p>
                    </div>
                </div>`;
        } else {
            renderBookings(data.data, phone);
        }
    } catch {
        alertEl.innerHTML = '<div class="alert alert-danger py-2 mb-0"><i class="fas fa-exclamation-circle me-2"></i>Lỗi kết nối máy chủ, vui lòng thử lại</div>';
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-search me-1"></i>Tra cứu';
}

function renderBookings(bookings, phone) {
    const resultEl = document.getElementById('trackResult');
    const cards = bookings.map(b => {
        const s   = STATUS_MAP[b.status] || { label: b.status, badge: 'secondary', icon: 'question' };
        const img = b.main_image
            ? `assets/images/cars/${b.main_image}`
            : 'assets/images/cars/default.jpg';

        return `
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-header bg-white d-flex align-items-center justify-content-between py-2">
                <strong class="text-primary">#${pad(b.id)}</strong>
                <span class="badge bg-${s.badge} px-3 py-2 rounded-pill">
                    <i class="fas fa-${s.icon} me-1"></i>${s.label}
                </span>
            </div>
            <div class="card-body p-3">
                <div class="d-flex gap-3 align-items-start">
                    <img src="${img}" alt="${b.car_name||''}"
                         class="rounded flex-shrink-0" style="width:90px;height:65px;object-fit:cover;"
                         onerror="this.src='assets/images/cars/default.jpg'">
                    <div class="flex-grow-1">
                        <h6 class="fw-bold mb-1">${b.car_name || 'Xe không xác định'}</h6>
                        <div class="row g-1 small text-muted">
                            <div class="col-6">
                                <i class="fas fa-calendar-alt me-1"></i>
                                Nhận: <strong class="text-dark">${fmtD(b.pickup_date)}</strong>
                            </div>
                            <div class="col-6">
                                <i class="fas fa-calendar-check me-1"></i>
                                Trả: <strong class="text-dark">${fmtD(b.return_date)}</strong>
                            </div>
                            <div class="col-6">
                                <i class="fas fa-moon me-1"></i>
                                ${b.total_days} ngày thuê
                            </div>
                            <div class="col-6">
                                <i class="fas fa-dollar-sign me-1"></i>
                                Tổng: <strong class="text-success">${fmt(b.total_price)}đ</strong>
                            </div>
                            ${b.pickup_location ? `<div class="col-12"><i class="fas fa-map-marker-alt me-1"></i>Địa điểm: ${b.pickup_location}</div>` : ''}
                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-white py-2 small text-muted">
                <i class="fas fa-clock me-1"></i>Đặt lúc: ${new Date(b.created_at).toLocaleString('vi-VN')}
            </div>
        </div>`;
    }).join('');

    resultEl.innerHTML = `
        <p class="text-muted small mb-2">
            <i class="fas fa-list me-1"></i>Tìm thấy <strong>${bookings.length}</strong> đơn với số <strong>${phone}</strong>
        </p>
        ${cards}
        <div class="text-center mt-3">
            <small class="text-muted">Cần hỗ trợ? Gọi hotline <strong>0123 456 789</strong></small>
        </div>`;
}

// Cho phép nhấn Enter để tra cứu
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('phoneInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') trackOrder();
    });
});
</script>
